version: 2

sources:
  - name: raw
    database: thndr_pipeline
    schema: public
    tables:
      - name: daily_prices
        description: "Raw daily OHLCV price data ingested from Yahoo Finance"
        columns:
          - name: ticker
            description: "Stock ticker symbol"
            tests:
              - not_null
          - name: price_date
            description: "Trading date"
            tests:
              - not_null
          - name: close
            description: "Closing price"
            tests:
              - not_null

      - name: stocks
        description: "Stock metadata — name and market"
        columns:
          - name: ticker
            description: "Stock ticker symbol"
            tests:
              - not_null
              - unique